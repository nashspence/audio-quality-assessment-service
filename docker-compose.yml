services:
  api:
    build:
      context: .
      dockerfile: Dockerfile
    env_file:
      - .env
    ports:
      - "${SERVICE_PORT:-8000}:8000"
    restart: unless-stopped
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "curl -fsS http://127.0.0.1:8000/healthz | python -c \"import json,sys; data=json.load(sys.stdin); sys.exit(0 if data.get('ready') else 1)\"",
        ]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 5s
